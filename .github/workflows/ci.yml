name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: |
          dotnet restore src/Whirtle.Client/Whirtle.Client.csproj
          dotnet restore src/Whirtle.Client.UI/Whirtle.Client.UI.csproj
          dotnet restore tests/Whirtle.Client.Tests/Whirtle.Client.Tests.csproj
          dotnet restore tests/Whirtle.Client.IntegrationTests/Whirtle.Client.IntegrationTests.csproj

      - name: Build core
        run: dotnet build src/Whirtle.Client/Whirtle.Client.csproj --no-restore --configuration Release

      - name: Build UI
        run: msbuild src/Whirtle.Client.UI/Whirtle.Client.UI.csproj -p:Configuration=Release -p:Platform=x64

      - name: Test
        run: dotnet test tests/Whirtle.Client.Tests/Whirtle.Client.Tests.csproj --no-restore --configuration Release
