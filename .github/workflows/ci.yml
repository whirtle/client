name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Copy AppxPackage tasks into .NET SDK
        shell: pwsh
        run: |
          $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $src = "$vsInstallPath\MSBuild\Microsoft\VisualStudio\v17.0\AppxPackage"
          $sdkVer = (dotnet --version).Trim()
          $dst = "C:\Program Files\dotnet\sdk\$sdkVer\Microsoft\VisualStudio\v18.0\AppxPackage"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item -Path "$src\*" -Destination $dst -Recurse

      - name: Restore
        run: |
          dotnet restore src/Whirtle.Client/Whirtle.Client.csproj
          dotnet restore src/Whirtle.Client.UI/Whirtle.Client.UI.csproj
          dotnet restore tests/Whirtle.Client.Tests/Whirtle.Client.Tests.csproj
          dotnet restore tests/Whirtle.Client.IntegrationTests/Whirtle.Client.IntegrationTests.csproj

      - name: Build core
        run: dotnet build src/Whirtle.Client/Whirtle.Client.csproj --no-restore --configuration Release

      - name: Build UI
        run: dotnet build src/Whirtle.Client.UI/Whirtle.Client.UI.csproj --no-restore --configuration Release -p:Platform=x64

      - name: Test
        run: dotnet test tests/Whirtle.Client.Tests/Whirtle.Client.Tests.csproj --no-restore --configuration Release
