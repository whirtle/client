name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Whirtle.Client.slnx

      - name: Build core
        run: dotnet build src/Whirtle.Client/Whirtle.Client.csproj --no-restore --configuration Release

      - name: Build UI
        run: dotnet build src/Whirtle.Client.UI/Whirtle.Client.UI.csproj --no-restore --configuration Release -p:Platform=x64

      - name: Test
        run: dotnet test tests/Whirtle.Client.Tests/Whirtle.Client.Tests.csproj --no-restore --configuration Release
